name: Build
on:
  push:
    tags:
      - "*"

jobs:
  build_Windows:
    strategy:
      matrix:
        preset:
          - windows-x64-release
          - windows-arm64-release
       
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --config Release
      
      - name: Install (staging)
        run: cmake --install build/${{ matrix.preset }} --prefix install/${{ matrix.preset }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LaytonPC-${{ github.ref_name }}-${{ matrix.preset }}
          path: install/${{ matrix.preset }}
